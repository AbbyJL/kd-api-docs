{foreach name="list" item="var"}
	<div class="line padding border-bottom">
		<div class="x12">
        	<p>ID：{$var.log_id} - {$var.order_id}</p>
			<p>说明：{$var.info}</p>
            <p>类型：{$var.name}</p>
            <p>状态：
            	{eq name="var.is_separate" value="0"}<span class="gray">待分账</span>{/eq}
                {eq name="var.is_separate" value="1"}<span class="weibo">已入账</span>{/eq}
            </p>
            <p class="text-dot">金额：{:round($var['money']/100,2)}元</p>  
		</div>
	</div>
	<div class="line padding">
		<span class="x12 text-right">
            <a class="text-gray">结算时间：{$var.create_time|date='Y-m-d H:i:s',###}</a>
        </span>
	</div>
	<div class="blank-10 bg"></div>
{/foreach}
