{include file='public:header'/}
<style type="text/css">
body{background: #f5f5f5;}
.Upload-img .list-img img {
width:100%;
height:auto;
}
</style>
<link rel="stylesheet" type="text/css" href="/static/default/webuploader/webuploader.css">
<script src="/static/default/webuploader/webuploader.min.js"></script>

{if condition="!$is_weixin"}
    <div class="headers">
        <img src="/static/default/newwap/img/return.png" onclick="javascript:history.back(-1);">
        <p>操作代理信息</p>
    </div>
    <div class="headers-space"></div>
{/if}




<form class="fabu-form" method="post"  id="ajaxForm" action="{:url('team/dailiedit',array('area_id'=>$area_id))}">



	<div class="seller-apply-form" style="margin-top: 1rem;">
    
    
    
    	{if condition="$area_id eq 0"}
            <div class="seller-apply-form-title">
                <span></span>
                <p>区域信息</p>
            </div>
            <div class="seller-apply-form-input">
                <select  name="data[area_id]" id="area_id"  class="text-input">
                    <option value="0">选择区县</option>
                    {foreach name="areas" item="var"}
                    <option value="{$var.area_id}"{if condition="$detail.area_id eq $var['area_id']"}selected{/if}>{$var.area_name}</option>
                    {/foreach}
                </select>
            </div>
        {/if}
        
        
    	<div class="seller-apply-form-title">
			<span></span>
			<p>用户信息</p>
		</div>
		<div class="seller-apply-form-input">
			<p>用户UID</p>
			<input type="text" class="text-input" name="data[user_id]" value="{$detail['user_id']}">
		</div>
		<div class="seller-apply-form-title">
			<span></span>
			<p>费率信息</p>
		</div>
		<div class="seller-apply-form-input">
			<p>分成费率</p>
			<input type="text" class="text-input" name="data[ratio]" value="{:round($detail['ratio']/100,2)}">
		</div>
        <div class="seller-apply-form-input">
			<p>VIP费率</p>
			<input type="text" class="text-input" name="data[ratio_vip]" value="{:round($detail['ratio_vip']/100,2)}">
		</div>
	</div>


	


	<div class="seller-member-btn">
		<button type="submit">确定设置</button>
	</div>

</form>

{include  file='public:footer'/}
