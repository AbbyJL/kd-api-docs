{include file='public:header'}

<style>
.fr1{ text-align:center;}
.login-open a {color: #333 !important;}
</style>

{if condition="!$is_weixin"}
    <div class="headers">
        <img src="/static/default/newwap/img/return.png" onclick="javascript:history.back(-1);">
        <p>登录页面</p>
    </div>
    <div class="headers-space"></div>
{/if}
    

 
   <div class="blank-10 bg"></div>
   <div class="line">
        <div class="login-form">
        <div class="blank-10"></div>
            <div class="form-group">
            <div class="field field-icon">
            <span class="iconfont icon-iconuser"></span>
            <input class="input account" type="text" value="" name="account" placeholder="请输入账号">
            </div>
            </div>

      <div class="blank-10"></div>
            <div class="form-group">
				<div class="field field-icon">
                <span class="iconfont icon-iconfontlock"></span>
           			<input class="input password" type="password" value="" name=" 、password" placeholder="请输入密码">
             </div>
            </div>  

            <div class="container">
		<div class="form-button">
                 <input id="btn" class="btn button button-block button-big bg-dot" type="button" value="代理登录">
                </div>
			</div>         
      </div>  
    </div>


<div class="blank-10"></div>
<div class="container login-open">
    <h5 style="text-align:center">欢迎登陆代理中心</h5>
    <div class="blank-10"></div>
</div>





<script type="text/javascript" language="javascript">
	$(document).ready(function(){
		$('.btn').click(function(){
			var account = $('.account').val();
			var password = $('.password').val();
			var yzm = $('.yzm').val();
			$.post('{:url("passport/login")}',{account:account,password:password,yzm:yzm},function(result){
				if(result.status == 'success'){
					layer.open({content:result.message,skin:'msg',time:2});
					setTimeout(function(){
						window.location.href=result.backurl;
					},2000);
				}else{
					layer.open({content:result.message,skin:'msg',time:2});
					if(result.backurl){
						setTimeout(function(){
							location.reload();
						},2000);
					}
				}
			},'json');
		})
	})
</script>
</body>
</html>
