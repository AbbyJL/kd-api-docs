                    <div class="result-content" id="tt">

<script>
$('#tt').tree({
        url: '{$CONFIG.site.host}/app/api/family/user_id/{$user_id}',
        loadFilter: function(rows){
            return convert(rows);
        }
    });
	
	function convert(rows){
        function exists(rows, parent_id){
            for(var i=0; i<rows.length; i++){
                if (rows[i].id == parent_id) return true;
            }
            return false;
        }
        
        var nodes = [];
        for(var i=0; i<rows.length; i++){
            var row = rows[i];
            if (!exists(rows, row.parent_id)){
                nodes.push({
                    id:row.id,
                    text:row.name
                });
            }
        }
        
        var toDo = [];
        for(var i=0; i<nodes.length; i++){
            toDo.push(nodes[i]);
        }
        while(toDo.length){
            var node = toDo.shift();  
            for(var i=0; i<rows.length; i++){
                var row = rows[i];
                if (row.parent_id == node.id){
                    var child = {id:row.id,text:row.name};
                    if (node.children){
                        node.children.push(child);
                    } else {
                        node.children = [child];
                    }
                    toDo.push(child);
                }
            }
        }
        return nodes;
    }
</script>
