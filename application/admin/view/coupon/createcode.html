{include  file='public:header'}

<div class="admin-main-bt">
    <ul>
        <li class="li1">优惠券</li>
        <li class="li2">优惠券管理</li>
        <li class="li2 li3">添加兑换券</li>
    </ul>
</div>
<div class="admin-main-sc-add">
	<p class="admin-attention"><span>说明：</span> 优惠券标题{$detail.title} - 优惠券的有效期{$detail.day}天 - 过期时间{$detail.expire_date} - 抵扣金额{:round($detail['reduce_price']/100,2)}元</p>
    <div class="admin-table-box">

        <form target="x-frame" action="{:url('coupon/createCode',array('coupon_id'=>$detail['coupon_id']))}" method="post">
            <table bordercolor="#e1e6eb" cellspacing="0" width="100%" border="1px"  style="border-collapse:collapse;margin:0px;vertical-align:middle;background-color:#FFF;">
            
              
                <tr>
                    <td  class="admin-table-left">总数量：</td>
                    <td class="admin-table-right"><input type="text" name="data[num]" value="{$detail.num|default=''}"   class="admin-manage-input"/>
                        <code>1-1000数量范围，建议500张</code>
                    </td>
                </tr>
            
                <tr>
                    <td  class="admin-table-left">描述：</td>
                    <td class="admin-table-right"><textarea  name="data[intro]" cols="50" rows="10" >{$detail.intro|default=''}</textarea>
    				<code>添加简短的描述</code>
                    </td>
                </tr>
    
        	</table>
            <div style="margin-left:140px;margin-top:20px">
                <input type="submit" value="确认添加" class="admin-btn-small-quren"/>
            <div>
</form>
</div>
</div>
{include  file='public:footer'}
