{include  file='public:header'}
<div class="admin-main-bt">
    <ul>
        <li class="li1">快递</li>
        <li class="li2">订单</li>
        <li class="li2 li3">在线下单</li>
    </ul>
</div>

<style>
.profit{text-align:center; color:#000; font-weight:bold; background:#ECECEC;}
</style>




	<form target="x-frame" action="{:url('order/create',array('user_id'=>$user_id))}" method="post">
        <div class="admin-main-sc-add"  style="margin-top:20px">
        <div class="admin-table-box"> 
            <table bordercolor="#e1e6eb" cellspacing="0" width="100%" border="1px"  style="border-collapse:collapse;margin:0px;vertical-align:middle;background-color:#FFF;">
  				
				<tr>
                    <td class="admin-table-left">会员ID：</td>
                    <td class="admin-table-right">
                        <div class="lt">
                            <input type="hidden" id="user_id" name="data[user_id]" value="{$detail.user_id|default=''}" class="admin-manage-input"/>
                            <input class="admin-sc-add-text-name sj" type="text" name="nickname" id="nickname"  value="{$user.nickname}"/>
                        </div>
                        <a mini="select"  w="920" h="600" href="{:url('user/select')}" class="admin-sele-xuanze">选择账户</a>
                    </td>
                </tr>
                <tr>
                    <td class="admin-table-left">物品名称：</td>
                    <td class="admin-table-right"><input type="text" name="data[cargoName]" value="{$detail.cargoName|default='日用品'}" class="admin-manage-input  w210"/>
                    <code>物品名称</code>
                    </td>
                </tr>
                <tr>
                    <td class="admin-table-left">物品重量：</td>
                    <td class="admin-table-right"><input type="text" name="data[wight]" value="{$detail.wight|default='1'}" class="admin-manage-input  w210"/>
                    <code>物品重量KG</code>
                    </td>
                </tr>
  				<tr>
                    <td class="admin-table-left">下单备注：</td>
                    <td class="admin-table-right"><input type="text" name="data[remark]" value="{$detail.remark|default=''}" class="admin-manage-input  w210"/>
                    <code>下单备注</code>
                    </td>
                </tr>
            	<tr>
                  <td class="admin-table-right profit" colspan="2">寄件人地址</td>
                </tr>
				<tr>
                    <td class="admin-table-left">寄件人名称：</td>
                    <td class="admin-table-right"><input type="text" name="data[sendName]" value="{$detail.sendName|default=''}" class="admin-manage-input w110"/>
                    <code>寄件人手机</code>
                    <input type="text" name="data[sendMobile]" value="{$detail.sendMobile|default=''}" class="admin-manage-input  w210"/>
                    </td>
                </tr>
 				
                <tr>
                    <td class="admin-table-left">寄件城市：</td>
                    <td class="admin-table-right">
                    	<input type="text" name="data[senderProvince]" value="{$detail.senderProvince|default=''}" class="admin-manage-input w150">省份
                        <input type="text" name="data[senderCity]" value="{$detail.senderCity|default=''}" class="admin-manage-input w150">城市
                        <input type="text" name="data[senderCounty]" value="{$detail.senderCounty|default=''}" class="admin-manage-input w150">区县
                    </td>
                </tr>
                <tr>
                    <td class="admin-table-left">寄件人地址：</td>
                    <td class="admin-table-right">
                    <textarea name="data[sendAddress]" class="sendAddress" cols="50" rows="3">{$detail.sendAddress|default=''}</textarea>
                    <code>详细地址</code>
                    <textarea name="sendAddress" id="s" cols="50" rows="3"></textarea>
                    <a id="sendAddress" class="admin-btn-default ">智能识别</a>
                    </td>
                </tr>
                <tr>
                  <td class="admin-table-right profit" colspan="2">收件人地址</td>
                </tr>
                
                <tr>
                    <td class="admin-table-left">收件人名称：</td>
                    <td class="admin-table-right"><input type="text" name="data[receiveName]" value="{$detail.receiveName|default=''}" class="admin-manage-input w110"/>
                    <code>收件人手机</code>
                    <input type="text" name="data[receiveMobile]" value="{$detail.receiveMobile|default=''}" class="admin-manage-input  w210"/>
                    </td>
                </tr>
 				
                
                <tr>
                    <td class="admin-table-left">收件城市：</td>
                    <td class="admin-table-right">
                    	<input type="text" name="data[receiveProvince]" value="{$detail.receiveProvince|default=''}" class="admin-manage-input w150">省份
                        <input type="text" name="data[receiveCity]" value="{$detail.receiveCity|default=''}" class="admin-manage-input w150">城市
                        <input type="text" name="data[receiveCounty]" value="{$detail.receiveCounty|default=''}" class="admin-manage-input w150">区县
                    </td>
                </tr>
                <tr>
                    <td class="admin-table-left">收件人地址：</td>
                    <td class="admin-table-right">
                    <textarea name="data[receiveAddress]" class="receiveAddress" cols="50" rows="3">{$detail.receiveAddress|default=''}</textarea>
                    <code>收件人详细地址</code>
                    <textarea name="receiveAddress" cols="50" rows="3" id="r"></textarea>
                    <a id="receiveAddress" class="admin-btn-default ">智能识别</a>
                    </td>
                </tr>
                
                <tr>
                  <td class="admin-table-right profit" colspan="2">其他信息</td>
                </tr>
                <tr>
                    <td class="admin-table-left">快递公司名字：</td>
                    <td class="admin-table-right"><input type="text" name="data[kuaidi]" value="{$detail.kuaidi|default=''}" class="admin-manage-input"/>
					<code>快递公司名字</code>
                    </td>
                </tr>
                <tr>
                    <td class="admin-table-left">运单号：</td>
                    <td class="admin-table-right"><input type="text" name="data[deliveryId]" value="{$detail.deliveryId|default=''}" class="admin-manage-input"/>
					<code>运单号</code>
                    </td>
                </tr>
                <tr>
                    <td class="admin-table-left">订单状态：</td>
                    <td class="admin-table-right">
                        <select name="data[orderStatus]" class="admin-sele-Fl jq_type" style="display:inline-block;">
                        	<option value="0">=请选择=</option>
                            {foreach name="getorderStatus" key="k" item="item"}
                               <option {eq name="k" value="$detail.orderStatus"}selected="selected"{/eq}  value="{$k}">{$item}</option>
                            {/foreach}
                        </select>
                        <code>订单状态</code>
                    </td>
                </tr>
                <tr>
                    <td class="admin-table-left">支付金额：</td>
                    <td class="admin-table-right"><input type="text" name="data[sumMoneyYuan]" value="{:round($detail['sumMoneyYuan']/100,2)}" class="admin-manage-input w80"/>
					<code>用户已支付金额</code>
                    </td>
                </tr>
              
              
    		</table>
            
            
            
   <div class="admin-small-qr"><input type="submit" value="确认编辑" class="admin-btn-small-quren"/></div>
</form>
</div>
</div>


<script>
var lock = 0;
function showLoader(msg) {
	parent.layer.load(2);
}

function hideLoader(){
    lock = 0;
    $("#loader").hide();
	parent.layer.closeAll('loading');
}


	

$("#sendAddress").click(function(){
	var url = "{:url('app/exp/aiarea')}";
	var content = $("#s").val();
	var shop_id = "{$SHOP['shop_id']}";
	console.log('content',content);
	if(content == '' || content=='NULL'){
		parent.layer.msg('请输入寄件详细地址',{icon:1})
		return false;
	}
	$.ajax({
		url: url,
		type: 'post',
		data:{"content":content,"shop_id":shop_id},
		success: function(data){
		  if(data.code == 1){
			  $("input[name='data[sendName]']").val(data.data.name);
			  $("input[name='data[sendMobile]']").val(data.data.phone);
			  $("input[name='data[senderProvince]']").val(data.data.province);
			  $("input[name='data[senderCity]']").val(data.data.city);
			  $("input[name='data[senderCounty]']").val(data.data.area);
			  $("textarea[name='data[sendAddress]']").val(data.data.address);
			  parent.layer.msg(data.msg,{icon:1})
		  }else{
			  parent.layer.msg(data.msg,{icon:1})
		  }
		}
	});
});



$("#receiveAddress").click(function(){
	var url = "{:url('app/exp/aiarea')}";
	var content = $("#r").val();
	var shop_id = "{$SHOP['shop_id']}";
	console.log('content',content);
	if(content == '' || content=='NULL'){
		parent.layer.msg('请输入收件详细地址',{icon:1})
		return false;
	}
	$.ajax({
		url: url,
		type: 'post',
		data:{"content":content,"shop_id":shop_id},
		success: function(data){
		  if(data.code == 1){
			  $("input[name='data[receiveName]']").val(data.data.name);
			  $("input[name='data[receiveMobile]']").val(data.data.phone);
			  $("input[name='data[receiveProvince]']").val(data.data.province);
			  $("input[name='data[receiveCity]']").val(data.data.city);
			  $("input[name='data[receiveCounty]']").val(data.data.area);
			  $("textarea[name='data[receiveAddress]']").val(data.data.address);
			  parent.layer.msg(data.msg,{icon:1})
		  }else{
			  parent.layer.msg(data.msg,{icon:1})
		  }
		}
	});
});

</script>
