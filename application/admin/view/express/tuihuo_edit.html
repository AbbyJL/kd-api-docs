                <tr>
                    <td class="admin-table-left">快运单号：</td>

                    </td>
                </tr>
                <tr>

                </tr>
                <tr>

                    <td class="admin-table-right"><input type="text" name="data[info]" value="{$detail.info|default=''}" class="admin-manage-input">
                        <code>备注</code>

                </tr>
