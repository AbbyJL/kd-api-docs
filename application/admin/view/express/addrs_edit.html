{include  file='public:header'/}
<div class="admin-main-bt">
    <ul>
        <li class="li1">地址</li>
        <li class="li2"> 地址管理</li>
        <li class="li2 li3"> 操作地址</li>
    </ul>
</div>
<div class="admin-main-sc-add ">
    <div class="admin-table-box">
        <form target="x-frame" action="{:url('express/addrs_edit',array('addr_id'=>$detail['addr_id']))}" method="post">
            <table  bordercolor="#dbdbdb" cellspacing="0" width="100%" border="1px"  style="border-collapse:collapse;margin:0px;vertical-align:middle;background-color:#FFF;">
              
                <tr>
                    <td class="admin-table-left">会员账户：</td>
                    <td class="admin-table-right">
                        <div class="lt">
                            <input type="hidden" id="user_id" name="data[user_id]" value="{$detail.user_id|default=''}" class="admin-manage-input"/>
                            <input class="admin-sc-add-text-name sj" type="text" name="nickname" id="nickname"  value="{$user.nickname}"/>
                        </div>
                        <a mini="select"  w="920" h="600" href="{:url('user/select')}" class="admin-sele-xuanze">选择账户</a>
                    </td>
                </tr> 
                
                
                <tr>
                    <td class="admin-table-left">姓名：</td>
                    <td class="admin-table-right"><input type="text" name="data[name]" value="{$detail.name|default=''}" class="admin-manage-input w160">
                    <code>姓名</code>
                    </td>
                </tr>
                <tr>
                    <td class="admin-table-left">电话：</td>
                    <td class="admin-table-right"><input type="text" name="data[mobile]" value="{$detail.mobile|default=''}" class="admin-manage-input w160">
                    <code>电话</code>
                    </td>
                </tr>
                
                <tr>
                    <td class="admin-table-left">详细地址：</td>
                    <td class="admin-table-right"><input type="text" name="data[address]" value="{$detail.address|default=''}" class="admin-manage-input">
                    <code>详细地址</code>
                    </td>
                </tr>
                
                 <tr>
                    <td class="admin-table-left">地址：</td>
                    <td class="admin-table-right">
                        <div class="row">
                            <div class="line">
                                <span class="x3 tit">地址</span>
                                <span class="x3">
                                    <select name="data[province]" id="province" class="admin-sc-add-text-name sogn" onchange="getCity();">
                                        <option value="0">选择省</option>
                                      {foreach name="provinceList" item="var"}
                                        <option value="{$var.id}"{if condition="$detail.province_id eq $var['id']"}selected{/if}>{$var.name}</option>
                                        {/foreach}
                                    </select>
                                </label>
                            </span>
                            <span class="x3">
                                <select  name="data[city]" id="city"  class="admin-sc-add-text-name sogn"onchange="javascript:getArea();">
                                    <option value="0">选择城市</option>
                                    {foreach name="cityList" item="var"}
                                    <option value="{$var.city_id}"{if condition="$detail.city_id eq $var['city_id']"}selected{/if}>{$var.name}</option>
                                    {/foreach}
                                </select>
                                </label>
                              </span>
                              <span class="x3">
                               <select name="data[area]" id="area" class="admin-sc-add-text-name sogn">
                                    <option value="0">选择区/县</option>
                                     {foreach name="areaList" item="var"}
                                    <option value="{$var.area_id}"{if condition="$detail.area_id eq $var['area_id']"}selected{/if}>{$var.area_name}</option>
                                    {/foreach}
                                </select>
                                </span>
                            </span>  
                            </div>
                        </div>
                    </td>
                </tr>
                
            </table>
            <div class="admin-small-qr"><input type="submit" value="确认编辑" class="admin-btn-small-quren"/></div>
        </form>
    </div>
</div>


<script>
function getCity(){
  var province = $("#province").val();
  $.ajax({
        type: "GET",
        url: "{$CONFIG.site.host}/app/datas/city2/type/province/upid/"+province,
        dataType : "jsonp",
        jsonpCallback:"jsonpCallback",
        cache : false,
        success: function(json){
            var cityHtml = '<option value="0">选择城市</option>';
            $.each(json,function(k,v){
                cityHtml+= '<option value="'+v.id+'">'+v.name+'</option>';
            })
            $("#city").html(cityHtml);
            $("#city").show();
        }
    });
}   

function getArea(){
  var city = $("#city").val();
  $.ajax({
        type: "GET",
        url: "{$CONFIG.site.host}/app/datas/city2/type/city/upid/"+city,
        dataType : "jsonp",
        jsonpCallback:"jsonpCallback",
        cache : false,
        success: function(json){
            var areaHtml = '<option value="0">选择区/县</option>';
            $.each(json,function(k,v){
                areaHtml+= '<option value="'+v.id+'">'+v.name+'</option>';
            })
            $("#area").html(areaHtml);
            $("#area").show();
        }
    });
}
</script>

{include file="public:footer"}
